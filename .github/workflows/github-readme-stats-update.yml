name: Update my profile's stats cards within my README

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight
  workflow_dispatch: # Allows you to run it manually

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&theme=algolia&show_icons=true&hide_rank=true
          path: profile/stats.svg
          token: ${{ secrets.GH_TOKEN_FOR_GITHUB_README_STATS_CARDS }}

      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=donut&theme=algolia&count-private=true&hide_progress=true
          path: profile/top-langs.svg
          token: ${{ secrets.GH_TOKEN_FOR_GITHUB_README_STATS_CARDS }}

      - name: Generate Streak Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: streak
          options: user=${{ github.repository_owner }}&theme=algolia&exclude_days=Sun%2CSat
          path: profile/streak.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Commit and Push with Retries
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update My GitHub README stats cards" || exit 0
          for i in 1 2 3; do git push & break || sleep 10; done
